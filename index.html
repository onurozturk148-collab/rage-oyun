<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RAGE Online</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; font-family:Arial; background:#1a1a1a; color:white;}
.header { background:black; padding:20px; text-align:center; font-size:30px; color:red;}
.container { display:flex;}
.left { width:20%; background:#2b2b2b; padding:10px;}
.menu-item { padding:10px; border-bottom:1px solid #444; cursor:pointer;}
.menu-item:hover { background:#444;}
.center { width:60%; padding:20px;}
.right { width:20%; background:#2b2b2b; padding:10px;}
button { padding:10px; background:red; color:white; border:none; margin-top:10px;}
input { padding:5px; margin-top:5px; width:100%;}
</style>
</head>

<body>

<div class="header">RAGE ONLINE</div>

<div class="container">

<div class="left">
  <div class="menu-item" onclick="ekran('soygun')">💰 Soygun</div>
  <div class="menu-item" onclick="ekran('ekipman')">🔫 Ekipman</div>
  <div class="menu-item" onclick="ekran('oyuncular')">👥 Oyuncular</div>
  <div class="menu-item" onclick="ekran('banka')">🏦 Banka</div>
</div>

<div class="center" id="icerik">Hoş geldin!</div>

<div class="right">
  <p>💰 Para: <span id="para">0</span></p>
  <p>⭐ Level: <span id="level">1</span></p>
  <p>🔫 Silah: <span id="silah">Yok</span></p>
  <p id="durum">Hazır</p>
</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSQZUKC4ci14LU4e4KpniDfTvZqzUJA",
  authDomain: "test-mode-bbc5d.firebaseapp.com",
  databaseURL: "https://test-mode-bbc5d-default-rtdb.firebaseio.com",
  projectId: "test-mode-bbc5d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🎮 OYUN
let para = 0;
let level = 1;
let silah = "yok";
let hapiste = false;
let cooldown = false;

let isim = prompt("İsmin:");
let oyuncuID = isim + "_" + Math.floor(Math.random()*1000);

// 🔥 ONLINE KAYIT
db.ref("oyuncular/" + oyuncuID).set({
  isim: isim,
  para: 0
});

// 🔥 PARA SENKRON
db.ref("oyuncular/" + oyuncuID + "/para").on("value", snap=>{
  if(snap.val()!=null){
    para = snap.val();
    guncelle();
  }
});

// 📺 SAYFA
function ekran(sayfa){

if(sayfa=="soygun"){
document.getElementById("icerik").innerHTML = `
<h2>💰 Soygun</h2>

<button onclick="soygun('kolay')">🚗 Kolay Soygun</button>
<button onclick="soygun('orta')">🏪 Orta Soygun</button>
<button onclick="soygun('zor')">🏦 Zor Soygun</button>
<button onclick="soygun('efsane')">💎 Efsane Soygun</button>

<p id="sonuc"></p>
`;
}

if(sayfa=="ekipman"){
document.getElementById("icerik").innerHTML = `
<h2>🔫 Silahlar</h2>

<button onclick="silahAl('bıçak',100)">🪓 Bıçak (100)</button>
<button onclick="silahAl('tabanca',500)">🔫 Tabanca (500)</button>
<button onclick="silahAl('smg',1000)">🔥 SMG (1000)</button>
<button onclick="silahAl('ak47',2000)">💣 AK-47 (2000)</button>
<button onclick="silahAl('sniper',4000)">☠️ Sniper (4000)</button>
`;
}

if(sayfa=="oyuncular"){
db.ref("oyuncular").on("value", snap=>{
let data = snap.val();
let html = "<h2>👥 Oyuncular</h2>";

for(let i in data){
html += "<p>" + data[i].isim + " - 💰 " + data[i].para + "</p>";
}

document.getElementById("icerik").innerHTML = html;
});
}

if(sayfa=="banka"){
document.getElementById("icerik").innerHTML = `
<h2>🏦 Para Gönder</h2>
<input id="hedef" placeholder="Oyuncu adı">
<input id="miktar" placeholder="Miktar">
<button onclick="paraGonder()">Gönder</button>
`;
}

}

// 🔫 SİLAH GÜCÜ
function silahBonus(){
if(silah=="bıçak") return 0.05;
if(silah=="tabanca") return 0.10;
if(silah=="smg") return 0.15;
if(silah=="ak47") return 0.25;
if(silah=="sniper") return 0.40;
return 0;
}

// 🎲 SOYGUN
function soygun(tur){

if(hapiste){ sonucYaz("⛔ Hapistesin"); return; }
if(cooldown){ sonucYaz("⏳ Bekle"); return; }

cooldown=true;

let risk=0;
let odul=0;

if(tur=="kolay"){ risk=0.2; odul=Math.random()*100; }
if(tur=="orta"){ risk=0.4; odul=Math.random()*300; }
if(tur=="zor"){ risk=0.6; odul=Math.random()*800; }
if(tur=="efsane"){ risk=0.8; odul=Math.random()*2000; }

let sans = Math.random() + silahBonus();

if(sans > risk){
let kazanc=Math.floor(odul);
para+=kazanc;
sonucYaz("💰 +" + kazanc);
}else{
sonucYaz("🚓 Yakalandın!");
hapseGir();
}

guncelle();
onlineKaydet();

setTimeout(()=>{cooldown=false;},3000);
}

// 🚓 HAPİS
function hapseGir(){
hapiste=true;
let sure=10;

let interval=setInterval(()=>{
sure--;
document.getElementById("durum").innerText="Hapiste: "+sure;

if(sure<=0){
hapiste=false;
document.getElementById("durum").innerText="Özgürsün";
clearInterval(interval);
}
},1000);
}

// 🔫 SİLAH AL
function silahAl(ad,fiyat){
if(para>=fiyat){
para-=fiyat;
silah=ad;
guncelle();
onlineKaydet();
}
}

// 🏦 PARA GÖNDER
function paraGonder(){

let hedef=document.getElementById("hedef").value;
let miktar=Number(document.getElementById("miktar").value);

if(miktar>para){ alert("Paran yok"); return; }

db.ref("oyuncular").once("value", snap=>{
let data=snap.val();

for(let i in data){
if(data[i].isim==hedef){

db.ref("oyuncular/"+i).update({
para:data[i].para+miktar
});

para-=miktar;
onlineKaydet();

alert("Gönderildi!");
}
}
});
}

// 🔥 ONLINE KAYDET
function onlineKaydet(){
db.ref("oyuncular/"+oyuncuID).update({
para:para
});
}

// 📊 UI
function sonucYaz(yazi){
document.getElementById("sonuc").innerText=yazi;
}

function guncelle(){
document.getElementById("para").innerText=para;
document.getElementById("level").innerText=level;
document.getElementById("silah").innerText=silah;
}

guncelle();

</script>

</body>
</html>
