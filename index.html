<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RAGE Online</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white; }

.header {
  background:black;
  padding:20px;
  text-align:center;
  font-size:28px;
  color:red;
  border-bottom:2px solid red;
}

.container { display:flex; height:calc(100vh - 80px); }

.left {
  width:220px;
  background:#1a1a1a;
}

.menu-title {
  padding:10px;
  background:#000;
  color:#aaa;
  border-bottom:1px solid #333;
}

.menu-item {
  padding:12px;
  border-bottom:1px solid #333;
  cursor:pointer;
  transition:0.2s;
}

.menu-item:hover {
  background:#222;
  color:red;
  padding-left:20px;
}

.center {
  flex:1;
  padding:20px;
}

.panel {
  background:#1a1a1a;
  padding:20px;
  border:1px solid #333;
  box-shadow:0 0 10px #000;
}

.right {
  width:220px;
  background:#1a1a1a;
  padding:10px;
}

.stat {
  padding:10px;
  border-bottom:1px solid #333;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:darkred;
  transform:scale(1.03);
}

.sonuc-box {
  margin-top:15px;
  padding:10px;
  background:#000;
  border:1px solid red;
}
</style>
</head>

<body>

<div class="header">RAGE ONLINE</div>

<div class="container">

<!-- SOL -->
<div class="left">
<div class="menu-title">GENEL</div>
<div class="menu-item" onclick="ekran('soygun')">💰 Soygun</div>
<div class="menu-item" onclick="ekran('ekipman')">🔫 Ekipman</div>

<div class="menu-title">SOSYAL</div>
<div class="menu-item" onclick="ekran('oyuncular')">👥 Oyuncular</div>
<div class="menu-item" onclick="ekran('banka')">🏦 Banka</div>
</div>

<!-- ORTA -->
<div class="center" id="icerik">
<div class="panel">
<h2>Hoş geldin</h2>
<p>Menüden bir seçim yap</p>
</div>
</div>

<!-- SAĞ -->
<div class="right">
<div class="stat">💰 Para: <span id="para">0</span></div>
<div class="stat">🔫 Silah: <span id="silah">Yok</span></div>
<div class="stat" id="durum">Durum: Hazır</div>
</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSQZUKC4ci14LU4e4KpniDfTvZqzUJA",
  authDomain: "test-mode-bbc5d.firebaseapp.com",
  databaseURL: "https://test-mode-bbc5d-default-rtdb.firebaseio.com",
  projectId: "test-mode-bbc5d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 KAYIT
let isim = localStorage.getItem("isim");
if(!isim){
  isim = prompt("İsmin:");
  localStorage.setItem("isim", isim);
}
let oyuncuID = isim;

// 🎮 DATA
let para = 0;
let silah = "yok";

// 🔥 DATABASE
db.ref("oyuncular/" + oyuncuID).once("value", snap=>{
  if(!snap.exists()){
    db.ref("oyuncular/" + oyuncuID).set({isim:isim,para:0});
  }
});

db.ref("oyuncular/" + oyuncuID + "/para").on("value", snap=>{
  if(snap.val()!=null){
    para = snap.val();
    guncelle();
  }
});

// 📺 MENÜ
function ekran(s){

if(s=="soygun"){
document.getElementById("icerik").innerHTML=`
<div class="panel">
<h2>Soygun</h2>

<button onclick="soygun(100,0.2)">🏃 Kapkaç</button>
<button onclick="soygun(300,0.4)">🚗 Araba</button>
<button onclick="soygun(800,0.6)">🏪 Market</button>
<button onclick="soygun(2000,0.8)">🏦 Banka</button>

<div id="sonuc" class="sonuc-box"></div>
</div>
`;
}

if(s=="ekipman"){
document.getElementById("icerik").innerHTML=`
<div class="panel">
<h2>Ekipman</h2>

<button onclick="silahAl('tabanca',500)">🔫 Tabanca (500)</button>
<button onclick="silahAl('ak47',2000)">💣 AK47 (2000)</button>
<button onclick="silahAl('sniper',4000)">☠️ Sniper (4000)</button>

<p>Seçili: ${silah}</p>
</div>
`;
}

if(s=="oyuncular"){
db.ref("oyuncular").on("value",snap=>{
let html="<div class='panel'><h2>Oyuncular</h2>";
let d=snap.val();

for(let i in d){
html+=`<p>${d[i].isim} - 💰 ${d[i].para}</p>`;
}

html+="</div>";
document.getElementById("icerik").innerHTML=html;
});
}

if(s=="banka"){
document.getElementById("icerik").innerHTML=`
<div class="panel">
<h2>Para Gönder</h2>

<input id="hedef" placeholder="isim">
<input id="miktar" placeholder="miktar">

<button onclick="paraGonder()">Gönder</button>
</div>
`;
}

}

// 🎲 SOYGUN
function soygun(odul,risk){

let bonus = 0;
if(silah=="tabanca") bonus=0.1;
if(silah=="ak47") bonus=0.25;
if(silah=="sniper") bonus=0.4;

if(Math.random()+bonus > risk){
para+=odul;
sonuc("💰 +" + odul);
}else{
sonuc("🚓 Yakalandın!");
}

guncelle();
kaydet();
}

// 🔫 SİLAH AL
function silahAl(ad,fiyat){
if(para>=fiyat){
para-=fiyat;
silah=ad;
sonuc("🔫 " + ad + " satın alındı");
guncelle();
kaydet();
}else{
alert("Paran yok!");
}
}

// 🏦 PARA
function paraGonder(){
let h=document.getElementById("hedef").value;
let m=Number(document.getElementById("miktar").value);

db.ref("oyuncular").once("value",snap=>{
let d=snap.val();

for(let i in d){
if(d[i].isim==h){
db.ref("oyuncular/"+i+"/para").set(d[i].para+m);
para-=m;
kaydet();
alert("Gönderildi");
}
}
});
}

// 🔁
function kaydet(){
db.ref("oyuncular/"+oyuncuID).update({para:para});
}

function sonuc(y){
let el = document.getElementById("sonuc");
if(el) el.innerText = y;
}

function guncelle(){
document.getElementById("para").innerText=para;
document.getElementById("silah").innerText=silah;
}

</script>

</body>
</html>
