<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RAGE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
.header { background:#000; border-bottom:2px solid red; text-align:center; padding:20px; font-size:30px; color:red; }
.container { display:flex; }
.left { width:220px; background:#1b1b1b; }
.menu-title { background:#000; padding:10px; color:#aaa; }
.menu-item { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
.menu-item:hover { background:#333; }
.center { flex:1; padding:10px; }
.panel { background:#1b1b1b; border:1px solid #333; margin-bottom:10px; padding:10px; }
.right { width:250px; background:#1b1b1b; padding:10px; }
.stat { padding:8px; border-bottom:1px solid #333; }
button { width:100%; padding:10px; margin-top:5px; background:red; border:none; color:white; cursor:pointer; }
input { width:100%; padding:8px; margin-top:5px; }
</style>

</head>
<body>

<div class="header">RAGE</div>

<div class="container">

<div class="left">
<div class="menu-title">GENEL</div>
<div class="menu-item" onclick="ekran('soygun')">Soygun</div>
<div class="menu-item" onclick="ekran('ekipman')">Ekipman</div>

<div class="menu-title">SOSYAL</div>
<div class="menu-item" onclick="oyuncular()">Oyuncular</div>
<div class="menu-item" onclick="liderlik()">Liderlik</div>
<div class="menu-item" onclick="saldir()">Saldır</div>

<div class="menu-title">ÇEVRE</div>
<div class="menu-item" onclick="ekran('banka')">Banka</div>
</div>

<div class="center" id="icerik"></div>

<div class="right">
<div class="stat">💰 Nakit: <span id="para">0</span></div>
<div class="stat">🏦 Banka: <span id="banka">0</span></div>
<div class="stat">💪 Güç: <span id="guc">1</span></div>
<div class="stat">🔫 Silah: <span id="silah">yok</span></div>
<div class="stat" id="durum">Özgür</div>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey:"AIzaSyCSQZUKC4ci14LU4e4KpniDfTvZqzUJA",
authDomain:"test-mode-bbc5d.firebaseapp.com",
databaseURL:"https://test-mode-bbc5d-default-rtdb.firebaseio.com",
projectId:"test-mode-bbc5d"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// kullanıcı
let isim=localStorage.getItem("isim");
if(!isim){
isim=prompt("İsmin:");
localStorage.setItem("isim",isim);
}

// veri
let para=0,banka=0,guc=1,silah="yok";
let hapiste=false,hapisBitis=0;

// kayıt
db.ref("oyuncular/"+isim).once("value",snap=>{
if(!snap.exists()){
db.ref("oyuncular/"+isim).set({para:0,banka:0,guc:1});
}
});

// aktiflik
db.ref("oyuncular/"+isim).update({aktif:true});
window.onbeforeunload=()=>db.ref("oyuncular/"+isim).update({aktif:false});

// sync
db.ref("oyuncular/"+isim).on("value",snap=>{
let d=snap.val();
if(d){
para=d.para||0;
banka=d.banka||0;
guc=d.guc||1;
guncelle();
}
});

// ekran
function ekran(s){

// SOYGUN
if(s=="soygun"){
icerik.innerHTML=`
<div class="panel">
<h3>Normal Soygun</h3>
<button onclick="soygun(100,0.2)">Kapkaç</button>
<button onclick="soygun(300,0.4)">Araba</button>
<button onclick="soygun(800,0.6)">Market</button>
</div>

<div class="panel">
<h3>💀 Banka Soygunu</h3>
<button onclick="katil()">Katıl (2000₺)</button>
<div id="katilanlar"></div>
</div>

<p id="sonuc"></p>
`;
bankaDinle();
}

// EKİPMAN
if(s=="ekipman"){
icerik.innerHTML=`
<div class="panel">
<h3>Silahlar</h3>
<button onclick="silahAl('Tabanca',500)">🔫 Tabanca - 500₺</button>
<button onclick="silahAl('AK47',2000)">💣 AK47 - 2000₺</button>
<button onclick="silahAl('Sniper',4000)">☠️ Sniper - 4000₺</button>
</div>
`;
}

// BANKA
if(s=="banka"){
icerik.innerHTML=`
<div class="panel">
<h3>Banka</h3>

<p>Nakit: ${para}</p>
<p>Banka: ${banka}</p>

<input id="miktar" placeholder="Miktar">
<button onclick="yatir()">Yatır</button>
<button onclick="cek()">Çek</button>

<hr>

<input id="hedef" placeholder="Oyuncu adı">
<input id="gonderMiktar" placeholder="Gönderilecek miktar">
<button onclick="paraGonder()">Oyuncuya Gönder</button>

</div>
`;
}

}

// NORMAL SOYGUN
function soygun(odul,risk){

if(hapiste){
sonuc("⛓️ Hapistesin");
return;
}

let sans=Math.random()+(guc*0.02);

if(sans>risk){
para+=odul;

if(Math.random()>0.7){
guc++;
}

sonuc("+"+odul);

}else{
para=0;
silah="yok";

let sure=Math.random()*150+30;
hapiste=true;
hapisBitis=Date.now()+sure*1000;

hapis();
}

kaydet();
guncelle();
}

// BANKA RAID
function katil(){
if(para<2000)return;
para-=2000;
db.ref("raid").push({isim});
}

function bankaDinle(){
db.ref("raid").on("value",snap=>{
let d=snap.val();
let liste=[];

if(d){
for(let i in d) liste.push(d[i].isim);
}

katilanlar.innerHTML=liste.join("<br>");

if(liste.length>=4){
alert("💀 Soygun başladı!");
db.ref("raid").remove();
}
});
}

// PvP
function saldir(){
let hedef=prompt("Kime saldır?");
db.ref("oyuncular/"+hedef).once("value",snap=>{
let d=snap.val();
if(!d)return;

if(guc>=(d.guc||1)){
para+=200;
}else{
para-=100;
}
kaydet();guncelle();
});
}

// oyuncular
function oyuncular(){
db.ref("oyuncular").on("value",snap=>{
let d=snap.val();
let html="";
for(let i in d){
html+=`<p>${d[i].aktif?"🟢":"⚫"} ${i}</p>`;
}
icerik.innerHTML=html;
});
}

// liderlik
function liderlik(){
db.ref("oyuncular").once("value",snap=>{
let d=snap.val();
let arr=[];
for(let i in d) arr.push({isim:i,para:d[i].para});
arr.sort((a,b)=>b.para-a.para);

let html="<h3>Liderlik</h3>";
arr.slice(0,10).forEach(k=>{
html+=`<p>${k.isim} - ${k.para}</p>`;
});
icerik.innerHTML=html;
});
}

// banka
function yatir(){
let m=Number(miktar.value);
if(m<=para){para-=m;banka+=m;}
kaydet();guncelle();
}

function cek(){
let m=Number(miktar.value);
if(m<=banka){banka-=m;para+=m;}
kaydet();guncelle();
}

// 💸 PARA GÖNDER
function paraGonder(){
let h=hedef.value;
let m=Number(gonderMiktar.value);

if(m>0 && m<=banka){

db.ref("oyuncular/"+h+"/banka").once("value",snap=>{
let p=snap.val()||0;

db.ref("oyuncular/"+h).update({
banka:p+m
});

banka-=m;
kaydet();
guncelle();
});

}
}

// ekipman
function silahAl(ad,fiyat){
if(para>=fiyat){
para-=fiyat;
silah=ad;
kaydet();guncelle();
}
}

// hapis
function hapis(){
let i=setInterval(()=>{
if(Date.now()>hapisBitis){
hapiste=false;
clearInterval(i);
}
},1000);
}

// save
function kaydet(){
db.ref("oyuncular/"+isim).update({
para,banka,guc
});
}

// ui
function sonuc(y){document.getElementById("sonuc").innerText=y;}
function guncelle(){
paraEl.innerText=para;
bankaEl.innerText=banka;
gucEl.innerText=guc;
silahEl.innerText=silah;
durum.innerText=hapiste?"Hapiste":"Özgür";
}

</script>

</body>
</html>
